# Development Docker Compose Configuration
# Hot-reload enabled for all services

version: '3.8'

services:
  # Agent Orchestrator - Core event routing
  agent-orchestrator:
    build:
      context: .
      dockerfile: services/agent-orchestrator/Dockerfile.dev
    container_name: agent-orchestrator-dev
    ports:
      - "3006:3006"
    volumes:
      - ./workspace:/workspace
      - ./services/agent-orchestrator/src:/app/src
      - ./services/shared:/shared
    environment:
      - NODE_ENV=development
      - WORKSPACE_BASE=/workspace
      - ORCHESTRATOR_PORT=3006
      - LOG_LEVEL=debug
    restart: unless-stopped

  # Event Listener - Real-time event detection
  event-listener:
    build:
      context: .
      dockerfile: services/event-listener/Dockerfile.dev
    container_name: event-listener-dev
    ports:
      - "3007:3007"
    volumes:
      - ./services/event-listener/src:/app/src
      - ./services/shared:/shared
    environment:
      - NODE_ENV=development
      - EVENT_LISTENER_PORT=3007
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - MOLTBOOK_BASE_URL=https://www.moltbook.com
      - ORCHESTRATOR_URL=http://agent-orchestrator:3006
      - LOG_LEVEL=debug
    depends_on:
      - agent-orchestrator
    restart: unless-stopped

  # AI Content Generator (existing service)
  ai-generator:
    build:
      context: ./services/ai-content-generator
    container_name: ai-generator-dev
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - VENICE_API_KEY=${VENICE_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
    restart: unless-stopped

  # Model Router (existing service)
  model-router:
    build:
      context: ./services/model-router
    container_name: model-router-dev
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - AI_GENERATOR_URL=http://ai-generator:3002
    depends_on:
      - ai-generator
    restart: unless-stopped

  # Thread Monitor (existing service)
  thread-monitor:
    build:
      context: ./services/thread-continuation-engine
    container_name: thread-monitor-dev
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - AI_GENERATOR_URL=http://ai-generator:3002
    volumes:
      - ./workspace:/workspace
    depends_on:
      - ai-generator
    restart: unless-stopped

  # NTFY Publisher (existing service)
  ntfy-publisher:
    build:
      context: ./services/ntfy-publisher
    container_name: ntfy-publisher-dev
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - NTFY_URL=${NTFY_URL}
      - NTFY_API=${NTFY_API}
    restart: unless-stopped

networks:
  default:
    name: moltbot-dev
    driver: bridge
