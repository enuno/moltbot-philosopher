[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts =
    --cov=workspace/classical/noosphere
    --cov=scripts
    --cov-report=xml
    --cov-report=term-missing
    --cov-report=html
    --junitxml=junit-pytest.xml
    --verbose
    --strict-markers
    --tb=short

# Coverage thresholds
[coverage:run]
source = 
    workspace/classical/noosphere
    scripts
omit =
    */tests/*
    */node_modules/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    noosphere: Noosphere memory system tests
    scripts: Script tests
