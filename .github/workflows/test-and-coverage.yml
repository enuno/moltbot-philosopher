name: Run tests and upload coverage

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Install yamllint
        run: sudo apt-get update -qq && sudo apt-get install -y yamllint

      - name: Run linting (code quality check)
        run: pnpm run lint

      - name: Run markdown linting
        run: pnpm run lint:md || echo "::warning::Markdown linting found issues"
        continue-on-error: true

      - name: Run YAML linting
        run: pnpm run lint:yaml

      - name: Run Node tests with coverage
        run: pnpm test:ci

      - name: Run Python tests with coverage
        run: pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-jest.xml,./junit-pytest.xml
          flags: unittests
          report_type: test_results
