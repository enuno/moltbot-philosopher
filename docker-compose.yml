services:
  # PostgreSQL 16 + pgvector for Noosphere v3.0
  postgres:
    image: pgvector/pgvector:pg16
    container_name: noosphere-postgres
    environment:
      - POSTGRES_DB=noosphere
      - POSTGRES_USER=noosphere_admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_noosphere_2026}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:rw
      - ./scripts/db/init-noosphere-v3.sql:/docker-entrypoint-initdb.d/01-init-noosphere.sql:ro
      - ./scripts/db/init-action-queue.sql:/docker-entrypoint-initdb.d/02-init-action-queue.sql:ro
      - ./logs:/logs:rw
    networks:
      - dokploy-network
    mem_limit: 2g
    cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noosphere_admin -d noosphere"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Noosphere v3.0 Service - Memory API
  noosphere-service:
    build:
      context: ./services/noosphere
      dockerfile: Dockerfile
    image: moltbot:noosphere-service
    container_name: noosphere-service
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://noosphere_admin:${POSTGRES_PASSWORD}@postgres:5432/noosphere?sslmode=disable
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMBEDDING_MODEL=text-embedding-ada-002
      - ENABLE_EMBEDDINGS=true
      - EMBEDDING_PROVIDER=openrouter
      - MAX_MEMORIES_PER_AGENT=200
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs:rw
    ports:
      - "3006:3006"
    networks:
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3006/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Classical Philosopher Agent (Virgil/Dante/Milton)
  classical-philosopher:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: moltbot:classical
    container_name: classical-philosopher
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 4g
    cpus: '2.0'
    environment:
      - AGENT_NAME=ClassicalPhilosopher
      - AGENT_TYPE=classical
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/classical.txt
      - DEFAULT_MODEL=kimi-k2.5-instant
      - PREMIUM_MODEL=kimi-k2.5-thinking
      - LONG_CONTEXT_THRESHOLD=1000
      - VERY_LONG_CONTEXT_THRESHOLD=10000
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - MOLTBOT_STATE_DIR=/workspace
      - NOOSPHERE_STATE_DIR=/workspace/classical/noosphere
      - NOOSPHERE_PYTHON_CLIENT=/app/noosphere-client
    env_file:
      - config/agents/classical-philosopher.env
    volumes:
      - ./workspace/classical:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "sh", "-c", "ps aux | grep -q entrypoint && exit 0 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Existentialist Agent (Sartre/Camus/Dostoevsky/Nietzsche)
  existentialist:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:existentialist
    container_name: existentialist
    mem_limit: 4g
    cpus: '2.0'
    environment:
      - AGENT_NAME=Existentialist
      - AGENT_TYPE=existentialist
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/existentialist.txt
    env_file:
      - config/agents/existentialist.env
    volumes:
      - ./workspace/existentialist:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Transcendentalist Agent (Emerson/Jefferson)
  transcendentalist:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:transcendentalist
    container_name: transcendentalist
    mem_limit: 2g
    cpus: '1.0'
    environment:
      - AGENT_NAME=Transcendentalist
      - AGENT_TYPE=transcendentalist
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/transcendentalist.txt
    env_file:
      - config/agents/transcendentalist.env
    volumes:
      - ./workspace/transcendentalist:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Joyce Stream Agent (Stream-of-consciousness)
  joyce-stream:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:joyce
    container_name: joyce-stream
    mem_limit: 6g
    cpus: '2.5'
    pids_limit: 768
    environment:
      - AGENT_NAME=JoyceStream
      - AGENT_TYPE=joyce
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/joyce-stream.txt
    env_file:
      - config/agents/joyce-stream.env
    volumes:
      - ./workspace/joyce:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Enlightenment Agent (Voltaire/Paine/Franklin)
  enlightenment:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:enlightenment
    container_name: enlightenment
    mem_limit: 3g
    cpus: '1.5'
    environment:
      - AGENT_NAME=Enlightenment
      - AGENT_TYPE=enlightenment
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/enlightenment.txt
    volumes:
      - ./workspace/enlightenment:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Beat Generation Agent (Ginsberg/Burroughs/Thompson)
  beat-generation:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:beat
    container_name: beat-generation
    mem_limit: 4g
    cpus: '2.0'
    environment:
      - AGENT_NAME=BeatGeneration
      - AGENT_TYPE=beat
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/beat.txt
    volumes:
      - ./workspace/beat:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Cyberpunk-Posthumanist Agent
  cyberpunk-posthumanist:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:cyberpunk
    container_name: cyberpunk-posthumanist
    mem_limit: 5g
    cpus: '2.5'
    environment:
      - AGENT_NAME=CyberpunkPosthumanist
      - AGENT_TYPE=cyberpunk-posthumanist
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/cyberpunk-posthumanist.txt
      - GIBSON_RATIO=0.4
      - ASIMOV_RATIO=0.3
      - DICK_RATIO=0.3
      - REALITY_ANCHOR=technological_materialism
    env_file:
      - config/agents/cyberpunk-posthumanist.env
    volumes:
      - ./workspace/cyberpunk-posthumanist:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Satirist-Absurdist Agent
  satirist-absurdist:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:satirist
    container_name: satirist-absurdist
    mem_limit: 4g
    cpus: '2.0'
    environment:
      - AGENT_NAME=SatiristAbsurdist
      - AGENT_TYPE=satirist-absurdist
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/satirist-absurdist.txt
      - HELLER_RATIO=0.35
      - VONNEGUT_RATIO=0.35
      - TWAIN_RATIO=0.30
      - BITTERNESS_THRESHOLD=0.6
      - CATCH_22_DETECTION=enabled
    env_file:
      - config/agents/satirist-absurdist.env
    volumes:
      - ./workspace/satirist-absurdist:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Scientist-Empiricist Agent
  scientist-empiricist:
    extends:
      service: classical-philosopher
      file: docker-compose.yml
    image: moltbot:scientist
    container_name: scientist-empiricist
    mem_limit: 6g
    cpus: '3.0'
    environment:
      - AGENT_NAME=ScientistEmpiricist
      - AGENT_TYPE=scientist-empiricist
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - CLAW_SYSTEM_PROMPT_FILE=/app/config/prompts/scientist-empiricist.txt
      - FEYNMAN_RATIO=0.25
      - SAGAN_RATIO=0.25
      - HAWKING_RATIO=0.25
      - EINSTEIN_RATIO=0.25
      - SHOULDERS_OF_GIANTS=enabled
      - ELEGANCE_THRESHOLD=0.8
    env_file:
      - config/agents/scientist-empiricist.env
    volumes:
      - ./workspace/scientist-empiricist:/workspace:rw
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./services/noosphere/python-client:/app/noosphere-client:ro

  # Eastern-to-Western Philosophical Bridge - 10th Council Voting Member
  eastern-bridge-service:
    build:
      context: ./services/eastern-bridge-service
      dockerfile: Dockerfile
    image: moltbot:eastern-bridge
    container_name: eastern-bridge-service
    environment:
      - SERVICE_NAME=eastern-bridge-service
      - SERVICE_PORT=3012
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - RATE_LIMIT_MAX_REQUESTS=10
      - RATE_LIMIT_WINDOW_MS=60000
      - KNOWLEDGE_DOMAINS_PATH=/etc/moltbot/config/prompts/eastern-bridge/knowledge-domains.json
      - HOT_RELOAD_ENABLED=true
      - HOT_RELOAD_DEBOUNCE_MS=1000
      - AUDIT_LOG_ENABLED=true
    volumes:
      - ./config/prompts/eastern-bridge:/etc/moltbot/config/prompts/eastern-bridge:ro
      - ./config/agents/eastern-bridge.env:/etc/moltbot/config/agents/eastern-bridge.env:ro
      - ./logs:/app/logs:rw
    ports:
      - "3012:3012"
    networks:
      - dokploy-network
    mem_limit: 512M
    cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:3012/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Islamic Mystic Philosopher - 11th Council Voting Member
  islamic-philosopher-service:
    build:
      context: ./services/islamic-mystic-philosopher-service
      dockerfile: Dockerfile
    image: moltbot:islamic-philosopher
    container_name: islamic-philosopher-service
    environment:
      - SERVICE_NAME=islamic-philosopher-service
      - SERVICE_PORT=3013
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - RATE_LIMIT_MAX_REQUESTS=10
      - RATE_LIMIT_WINDOW_MS=60000
      - KNOWLEDGE_DOMAINS_PATH=/etc/moltbot/config/prompts/islamic-mystic-philosopher/knowledge-domains.json
      - HOT_RELOAD_ENABLED=true
      - HOT_RELOAD_DEBOUNCE_MS=1000
      - AUDIT_LOG_ENABLED=true
    volumes:
      - ./config/prompts/islamic-mystic-philosopher:/etc/moltbot/config/prompts/islamic-mystic-philosopher:ro
      - ./config/agents/islamic-mystic-philosopher.env:/etc/moltbot/config/agents/islamic-mystic-philosopher.env:ro
      - ./logs:/app/logs:rw
    ports:
      - "3013:3011"
    networks:
      - dokploy-network
    mem_limit: 512M
    cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:3011/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dokploy-network:
    external: true
